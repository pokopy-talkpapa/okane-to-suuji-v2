<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>おかねとすうじ</title>
<style>
  :root {
    --bg: #f7f7f7;
    --panel: #ffffff;
    --shadow: 0 8px 20px rgba(0,0,0,.10);
    --radius: 16px;
    --dark: #111;
    --ok: #0f8a2b;
    --ng: #e0453a;
  }
  * { box-sizing: border-box; touch-action: manipulation; }
  html { height: 100%; }
  body {
    margin: 0;
    font-family: system-ui, -apple-system, "Noto Sans JP", sans-serif;
    background: var(--bg);
    color: var(--dark);
    height: 100%;
    overflow: hidden;
  }
  .wrap { max-width: 520px; margin: 0 auto; padding: 12px; height: 100%; overflow-y: auto; }
  .panel {
    background: var(--panel);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 14px 12px 20px;
  }

  /* タイトル行 */
  .titleRow { position:relative; min-height:44px; margin-bottom:14px; }
  .title { font-weight:950; font-size:20px; margin:0; text-align:center; line-height:44px; }
  .soundBtn {
    position:absolute; right:0; top:0;
    border:0; border-radius:14px;
    display:inline-flex; align-items:center; gap:6px;
    padding:10px 12px; font-size:14px; font-weight:900;
    cursor:pointer; background:#f1f1f1; color:var(--dark); line-height:1;
  }
  .soundBtn.off { background:#e9e9e9; color:#666; }

  /* ===== スタート画面 ===== */
  .startScreen {
    display:flex; flex-direction:column; align-items:center;
    padding:24px 16px 36px; gap:18px;
  }
  .startMsg { margin:0; font-size:1.05rem; font-weight:700; color:#555; text-align:center; }
  .howto {
    width:100%; background:#f5f7fa; border-radius:14px;
    padding:14px 16px; display:flex; flex-direction:column; gap:10px;
  }
  .howto-title { font-size:0.8rem; font-weight:700; color:#888; letter-spacing:.06em; margin:0; }
  .howto-steps { margin:0; padding:0; list-style:none; display:flex; flex-direction:column; gap:8px; }
  .howto-steps li { display:flex; align-items:flex-start; gap:10px; font-size:0.9rem; line-height:1.5; color:#333; }
  .howto-num {
    flex-shrink:0; width:22px; height:22px; border-radius:50%;
    background:var(--dark); color:#fff;
    font-size:0.75rem; font-weight:700;
    display:flex; align-items:center; justify-content:center;
    margin-top:1px;
  }
  .modeButtons { display:flex; flex-direction:column; gap:12px; width:100%; }
  .modeBtn {
    border:0; border-radius:16px; font-weight:950; cursor:pointer;
    padding:18px 20px; font-size:18px;
    color:#fff; box-shadow:0 4px 12px rgba(0,0,0,.15);
    transition:transform .1s, opacity .1s;
    text-align:center; line-height:1.3;
  }
  .modeBtn:active { transform:scale(.97); }
  .modeBtn.m1 { background:#e65100; }
  .modeBtn.m2 { background:#1565c0; }
  .modeBtn.m3 { background:#2e7d32; }
  .modeBtn .sub { font-size:0.7rem; font-weight:700; opacity:.8; display:block; margin-top:2px; }

  /* ===== ゲーム画面 ===== */
  .gameScreen { display:none; }
  .gameScreen.active { display:block; }

  /* 位テーブル（色なし・ニュートラル） */
  table.place { width:100%; border-collapse:collapse; table-layout:fixed; margin-bottom:10px; }
  table.place th {
    font-size:0.85rem; font-weight:700; padding:7px 4px; text-align:center;
    border-radius:8px 8px 0 0;
    background:#f0f0f0; color:#555;
  }
  table.place td { padding:4px 3px; vertical-align:middle; text-align:center; background:#fafafa; }

  /* 問題数字（mode1/mode3） */
  .problemNum {
    text-align:center; margin:4px 0 12px;
    font-size:3.6rem; font-weight:950; letter-spacing:.06em; color:var(--dark);
  }

  /* コインエリア */
  .coinArea { height:220px; display:flex; justify-content:center; align-items:flex-end; padding:4px 0; overflow:hidden; }
  .coinGroup { display:flex; gap:4px; align-items:flex-end; width:84px; }
  .coinCol { display:flex; flex-direction:column-reverse; align-items:center; gap:2px; width:40px; flex-shrink:0; }
  .coinImg { width:40px; height:40px; object-fit:contain; user-select:none; flex-shrink:0; }
  .coinImg.removable { cursor:pointer; }
  .emptyCoins { color:#bbb; font-size:.85rem; border:2px dashed #ccc; border-radius:10px; padding:5px 8px; }

  /* ===== 4ボタン行（コイン×3 + できた！） ===== */
  .actionRow {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1.3fr;
    gap: 8px;
    margin-bottom: 10px;
  }
  .coinAddBtn {
    border: 0;
    background: #f0f0f0;
    border-radius: 14px;
    padding: 10px 4px 8px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: background .1s, transform .08s;
    -webkit-tap-highlight-color: transparent;
  }
  .coinAddBtn:active { background: #ddd; transform: scale(.92); }
  .coinAddBtn img { width: 52px; height: 52px; object-fit: contain; pointer-events: none; user-select: none; }

  /* できた！ボタン */
  .doneBtn {
    display:block; width:100%; border:0; border-radius:14px; font-weight:950;
    padding:16px; font-size:22px; cursor:pointer;
    background:var(--dark); color:#fff;
    box-shadow:0 5px 12px rgba(0,0,0,.18);
    transition:transform .1s;
  }
  .doneBtn:active { transform:scale(.98); }

  /* mode2: スピナー */
  .spinner { display:flex; flex-direction:column; align-items:center; gap:2px; padding:4px 0; }
  .spinBtn {
    border:0; border-radius:8px; font-size:1.4rem; font-weight:900;
    cursor:pointer; background:#e8e8e8; padding:4px 0; width:100%;
    line-height:1.2; transition:background .1s;
  }
  .spinBtn:active { background:#ccc; }
  .spinDigit { font-size:2.4rem; font-weight:950; line-height:1.2; color:var(--dark); }

  /* 結果表示 */
  .resultArea { text-align:center; min-height:2.8rem; margin-top:8px; }
  .result { font-size:2rem; font-weight:700; min-height:2rem; }
  .result.ok { color:var(--ok); }
  .result.ng { color:var(--ng); }

  @keyframes victory {
    0%  { transform:scale(0.3); opacity:0; }
    50% { transform:scale(1.35); opacity:1; }
    70% { transform:scale(0.92); }
    100%{ transform:scale(1); opacity:1; }
  }
  .result.victory { animation:victory .55s cubic-bezier(.36,.07,.19,.97) both; color:#e8a000; }

  .star { position:fixed; font-size:1.8rem; pointer-events:none; z-index:99; animation:flystar .7s ease-out forwards; }
  @keyframes flystar {
    0%  { opacity:1; transform:translate(0,0) scale(1); }
    100%{ opacity:0; transform:translate(var(--dx),var(--dy)) scale(0.4); }
  }

  @keyframes shake {
    0%,100% { transform:translateX(0); }
    15%     { transform:translateX(-8px); }
    30%     { transform:translateX(8px); }
    45%     { transform:translateX(-6px); }
    60%     { transform:translateX(6px); }
    75%     { transform:translateX(-3px); }
    90%     { transform:translateX(3px); }
  }
  .shaking { animation:shake .45s ease; }

  /* 数直線 */
  .numberLine { margin-top:12px; }
  .nlTrack {
    height:18px; background:#e8e8e8;
    border-radius:9px; overflow:hidden; margin-bottom:4px;
    display:flex;
  }
  .nlSeg {
    height:100%; width:0%;
    transition:width .15s ease-out, background .35s ease;
  }
  .nlSegH { background:#f59e0b; }
  .nlSegT { background:#4a9eff; }
  .nlSegO { background:#f472b6; }
  .nlLabels {
    display:flex; justify-content:space-between;
    font-size:0.65rem; color:#888; padding:0 2px;
  }
  .nlValue { text-align:center; font-size:1rem; font-weight:700; color:#4a9eff; margin-top:2px; }

  /* 戻るボタン */
  .backBtn {
    border:0; background:none; font-size:0.85rem; color:#888;
    cursor:pointer; padding:4px 0; margin-bottom:8px;
    display:flex; align-items:center; gap:4px;
  }
  .backBtn:active { opacity:.6; }

  /* ===== mode3 タイマー ===== */
  .m3TimerWrap { text-align:center; margin-bottom:2px; }
  .m3TimerNum {
    font-size:2.6rem; font-weight:950; color:#2e7d32; letter-spacing:.04em;
    transition: color .2s;
  }
  .m3TimerNum.urgent { color:#e0453a; }
  .m3TimerLabel { font-size:0.8rem; color:#888; font-weight:700; margin-left:2px; }

  /* ===== mode3 リザルト ===== */
  .m3ResultWrap {
    display:flex; flex-direction:column; align-items:center;
    padding:28px 16px 36px; gap:14px; text-align:center;
  }
  .m3ScoreNum { font-size:5.5rem; font-weight:950; color:#2e7d32; line-height:1; }
  .m3ScoreLabel { font-size:1.15rem; font-weight:700; color:#555; margin-top:-4px; }
  .m3BestNew {
    font-size:1.05rem; font-weight:900; color:#e8a000;
    background:#fff8e1; border-radius:12px; padding:8px 20px;
  }
  .m3BestScore { font-size:0.85rem; color:#888; font-weight:700; }
  .m3RetryBtn {
    border:0; border-radius:16px; font-weight:950; cursor:pointer;
    padding:18px 40px; font-size:18px;
    color:#fff; background:#2e7d32; box-shadow:0 4px 12px rgba(0,0,0,.15);
    transition:transform .1s;
    margin-top:4px;
  }
  .m3RetryBtn:active { transform:scale(.97); }

  @media (max-width: 480px) {
    .wrap { padding:6px; }
    .panel { padding:10px 8px 16px; }
    .title { font-size:17px; }
    .problemNum { font-size:2.8rem; }
    .modeBtn { font-size:16px; padding:15px 16px; }
    .doneBtn { font-size:19px; padding:14px; }
    .spinDigit { font-size:2rem; }
    .coinAddBtn img { width: 44px; height: 44px; }
    .m3ScoreNum { font-size:4.5rem; }
    .m3TimerNum { font-size:2.2rem; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="panel">
    <div class="titleRow">
      <p class="title">おかねとすうじ</p>
      <button id="soundBtn" class="soundBtn" type="button">
        <span id="soundIcon">🔊</span>

    <!-- スタート画面 -->

            style="border:0; border-radius:14px; background:#fff3e0; color:#e65100;
                   font-size:1rem; font-weight:900; padding:10px 22px; cursor:pointer;

<script src="logic.js"></script>
<script>
  // ===== サウンド =====
  let soundOn = localStorage.getItem('okaneToSuujiSoundOn') !== 'off';
  let audioCtx = null;

  let _successBuf = null;
  let _pendingSuccessAB = null;
  fetch('sounds/coins-success.mp3').then(r => r.arrayBuffer()).then(ab => {
    if (audioCtx) audioCtx.decodeAudioData(ab).then(buf => { _successBuf = buf; }).catch(()=>{});
    else _pendingSuccessAB = ab;
  }).catch(()=>{});

  function getCtx() {
    const Cls = window.AudioContext || window.webkitAudioContext;
    if (!Cls) return null;
    if (!audioCtx) {
      audioCtx = new Cls();
      if (_pendingSuccessAB) {
        audioCtx.decodeAudioData(_pendingSuccessAB).then(buf => { _successBuf = buf; }).catch(()=>{});
        _pendingSuccessAB = null;
      }
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }

  function beep({ freq=880, dur=0.08, type='sine', gain=0.03, when=0 }) {
    if (!soundOn) return;
    const ctx = getCtx(); if (!ctx) return;
    const now = ctx.currentTime + when;
    const osc = ctx.createOscillator();
    const amp = ctx.createGain();
    osc.type = type; osc.frequency.setValueAtTime(freq, now);
    amp.gain.setValueAtTime(0.0001, now);
    amp.gain.exponentialRampToValueAtTime(gain, now + 0.01);
    amp.gain.exponentialRampToValueAtTime(0.0001, now + dur);
    osc.connect(amp); amp.connect(ctx.destination);
    osc.start(now); osc.stop(now + dur + 0.02);
  }

  function playCoinTick() {
    if (!soundOn) return;
    const ctx = getCtx(); if (!ctx) return;
    const now = ctx.currentTime;
    [[2000, 0.058], [3300, 0.038], [5200, 0.022]].forEach(([f, g], i) => {
      const osc = ctx.createOscillator();
      const amp = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(f, now + i*0.001);
      osc.frequency.exponentialRampToValueAtTime(f * 0.42, now + 0.11);
      amp.gain.setValueAtTime(g, now + i*0.001);
      amp.gain.exponentialRampToValueAtTime(0.0001, now + 0.13 - i*0.008);
      osc.connect(amp); amp.connect(ctx.destination);
      osc.start(now + i*0.001); osc.stop(now + 0.17);
    });
  }

  function playDeleteCoin() {
    if (!soundOn) return;
    const ctx = getCtx(); if (!ctx) return;
    const now = ctx.currentTime;
    [[700, 0.040], [1300, 0.025]].forEach(([f, g], i) => {
      const osc = ctx.createOscillator();
      const amp = ctx.createGain();
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(f, now + i * 0.002);
      osc.frequency.exponentialRampToValueAtTime(f * 0.18, now + 0.14);
      amp.gain.setValueAtTime(g, now + i * 0.002);
      amp.gain.exponentialRampToValueAtTime(0.0001, now + 0.15);
      osc.connect(amp); amp.connect(ctx.destination);
      osc.start(now + i * 0.002);
      osc.stop(now + 0.18);
    });
  }

  function _playJaraJara(ctx) {
    const N = 16;
    for (let i = 0; i < N; i++) {
      const ms = i * 60 + (Math.random() * 22 | 0);
      setTimeout(() => {
        if (!soundOn) return;
        const t = ctx.currentTime;
        const f = 1200 + (Math.random() * 3200 | 0);
        const g = 0.03 + Math.random() * 0.04;
        const o = ctx.createOscillator();
        const a = ctx.createGain();
        o.type = 'sine';
        o.frequency.setValueAtTime(f, t);
        o.frequency.exponentialRampToValueAtTime(f * 0.28, t + 0.1);
        a.gain.setValueAtTime(g, t);
        a.gain.exponentialRampToValueAtTime(0.0001, t + 0.13);
        o.connect(a); a.connect(ctx.destination);
        o.start(t); o.stop(t + 0.16);
      }, ms);
    }
  }

  function playSuccess() {
    if (!soundOn) return;
    const ctx = getCtx(); if (!ctx) return;
    if (_successBuf) {
      const src = ctx.createBufferSource();
      src.buffer = _successBuf;
      const gain = ctx.createGain();
      const t = ctx.currentTime;
      gain.gain.setValueAtTime(0.75, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 1.4);
      src.connect(gain); gain.connect(ctx.destination);
      src.start(t, 0);
      src.stop(t + 1.5);
    } else {
      _playJaraJara(ctx);
    }
  }
  function playVictory() {
    beep({ freq:880,  dur:0.08, gain:0.035, when:0    });
    beep({ freq:1100, dur:0.08, gain:0.03,  when:0.09 });
    beep({ freq:1320, dur:0.12, gain:0.035, when:0.18 });
  }
  function playWrong() { beep({ freq:180, dur:0.12, type:'triangle', gain:0.03 }); }

  function updateSoundBtn() {
    document.getElementById('soundBtn').classList.toggle('off', !soundOn);
    document.getElementById('soundIcon').textContent = soundOn ? '🔊' : '🔇';
    document.getElementById('soundLabel').textContent = soundOn ? 'おと ON' : 'おと OFF';
  }
  document.getElementById('soundBtn').addEventListener('click', () => {
    soundOn = !soundOn;
    localStorage.setItem('okaneToSuujiSoundOn', soundOn ? 'on' : 'off');
    updateSoundBtn();
  });
  updateSoundBtn();

  // ===== 音声読み上げ =====
  function speakNumber(num) {
    if (!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(String(num));
    utter.lang = 'ja-JP';
    utter.rate = 0.85;
    window.speechSynthesis.speak(utter);
  }
  function speakIfOn(num) { if (soundOn) speakNumber(num); }

  // ===== ストリーク =====
  let streak = 0;
  let bestStreak = parseInt(localStorage.getItem('okaneStreakBest') || '0', 10);

  function updateStreakDisplay() {
    document.getElementById('streakNum').textContent = streak;
    document.getElementById('streakFire').style.display = streak > 0 ? '' : 'none';
  }
  function onStreakCorrect() {
    streak++;
    if (streak > bestStreak) {
      bestStreak = streak;
      localStorage.setItem('okaneStreakBest', bestStreak);
    }
    updateStreakDisplay();
  }
  function onStreakWrong() {
    streak = 0;
    updateStreakDisplay();
  }

  // ===== 画面切替 =====
  function showStart() {
    streak = 0;
    updateStreakDisplay();
    document.getElementById('startScreen').style.display = '';
    document.getElementById('gameScreen').classList.remove('active');
  }
  function showGame() {
    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('gameScreen').classList.add('active');
  }

  document.getElementById('backBtn').addEventListener('click', () => {
    if (m3Timer) { clearInterval(m3Timer); m3Timer = null; }
    showStart();
  });
  document.getElementById('startMode1').addEventListener('click', () => startGame('mode1'));
  document.getElementById('startMode2').addEventListener('click', () => startGame('mode2'));
  document.getElementById('startMode3').addEventListener('click', () => startGame('mode3'));

  // ===== 共通状態 =====
  let currentMode = null;
  let targetNum   = 0;
  let userCoins   = { h: 0, t: 0, o: 0 };
  let userDigits  = { h: 0, t: 0, o: 0 };

  // ===== mode3専用状態 =====
  let m3Timer    = null;
  let m3TimeLeft = 30;
  let m3Score    = 0;

  const COIN_SRC = {
    h: 'imgs/money_100.png',
    t: 'imgs/money_10.png',
    o: 'imgs/money_1.png',
  };

  function renderCoinArea(el, coinSrc, count, onRemove) {
    el.innerHTML = '';
    if (count === 0) {
      el.innerHTML = '<span class="emptyCoins">０まい</span>';
      return;
    }
    const group = document.createElement('div');
    group.className = 'coinGroup';
    [Math.min(count, 5), Math.max(0, count - 5)].forEach(n => {
      if (n === 0) return;
      const col = document.createElement('div');
      col.className = 'coinCol';
      for (let i = 0; i < n; i++) {
        const img = document.createElement('img');
        img.className = 'coinImg';
        img.src = coinSrc;
        img.alt = '';
        if (onRemove) {
          img.classList.add('removable');
          img.addEventListener('click', onRemove);
        }
        col.appendChild(img);
      }
      group.appendChild(col);
    });
    el.appendChild(group);
  }

  function renderMode1() {
    const makeRemover = (place) => () => {
      if (userCoins[place] <= 0) return;
      userCoins[place]--;
      playDeleteCoin();
      renderMode1();
      updateLiveBar('mode1');
    };
    renderCoinArea(document.getElementById('m1CoinsH'), COIN_SRC.h, userCoins.h, makeRemover('h'));
    renderCoinArea(document.getElementById('m1CoinsT'), COIN_SRC.t, userCoins.t, makeRemover('t'));
    renderCoinArea(document.getElementById('m1CoinsO'), COIN_SRC.o, userCoins.o, makeRemover('o'));
  }

  function renderMode3() {
    const makeRemover = (place) => () => {
      if (userCoins[place] <= 0) return;
      userCoins[place]--;
      playDeleteCoin();
      renderMode3();
      updateLiveBar('mode3');
    };
    renderCoinArea(document.getElementById('m3CoinsH'), COIN_SRC.h, userCoins.h, makeRemover('h'));
    renderCoinArea(document.getElementById('m3CoinsT'), COIN_SRC.t, userCoins.t, makeRemover('t'));
    renderCoinArea(document.getElementById('m3CoinsO'), COIN_SRC.o, userCoins.o, makeRemover('o'));
  }

  function startGame(mode) {
    showGame();
    currentMode = mode;
    targetNum = generateProblem();

    document.getElementById('mode1Screen').style.display = mode === 'mode1' ? '' : 'none';
    document.getElementById('mode2Screen').style.display = mode === 'mode2' ? '' : 'none';
    document.getElementById('mode3Screen').style.display = mode === 'mode3' ? '' : 'none';
    document.getElementById('m3ResultScreen').style.display = 'none';
    document.getElementById('streakDisplay').style.display = (mode === 'mode1' || mode === 'mode2') ? '' : 'none';

    if (mode === 'mode1') {
      userCoins = { h: 0, t: 0, o: 0 };
      document.getElementById('m1ProblemNum').textContent = targetNum;
      document.getElementById('m1Result').textContent = '';
      document.getElementById('m1Result').className = 'result';
      resetBar('m1');
      renderMode1();
      speakIfOn(targetNum);
    }
    if (mode === 'mode2') {
      userDigits = { h: 0, t: 0, o: 0 };
      document.getElementById('m2Result').textContent = '';
      document.getElementById('m2Result').className = 'result';
      resetBar('m2');
      renderMode2();
    }
    if (mode === 'mode3') {
      if (m3Timer) { clearInterval(m3Timer); m3Timer = null; }
      m3Score = 0;
      m3TimeLeft = 30;
      userCoins = { h: 0, t: 0, o: 0 };
      document.getElementById('m3ProblemNum').textContent = targetNum;
      const timerEl = document.getElementById('m3TimerDisplay');
      timerEl.textContent = '30';
      timerEl.classList.remove('urgent');
      resetBar('m3');
      renderMode3();
      startM3Timer();
    }
  }

  // ===== mode3 タイマー =====
  function startM3Timer() {
    m3Timer = setInterval(() => {
      m3TimeLeft--;
      const el = document.getElementById('m3TimerDisplay');
      el.textContent = m3TimeLeft;
      el.classList.toggle('urgent', m3TimeLeft <= 5);
      if (m3TimeLeft <= 0) {
        clearInterval(m3Timer);
        m3Timer = null;
        showM3Result();
      }
    }, 1000);
  }

  function showM3Result() {
    document.getElementById('mode3Screen').style.display = 'none';
    document.getElementById('m3ResultScreen').style.display = '';
    document.getElementById('m3ScoreNum').textContent = m3Score;

    const prev = parseInt(localStorage.getItem('okaneToSuujiM3Best') || '0', 10);
    const isNew = m3Score > 0 && m3Score > prev;
    if (isNew) {
      localStorage.setItem('okaneToSuujiM3Best', m3Score);
    }
    const best = isNew ? m3Score : prev;
    document.getElementById('m3BestNew').style.display = isNew ? '' : 'none';
    document.getElementById('m3BestScore').textContent = 'ベスト：' + best + 'もん';
  }

  // mode1コインボタン
  document.querySelectorAll('#mode1Screen .coinAddBtn').forEach(btn => {
    btn.addEventListener('click', () => {
      const place = btn.dataset.place;
      if (userCoins[place] >= 9) return;
      userCoins[place]++;
      playCoinTick();
      renderMode1();
      updateLiveBar('mode1');
    });
  });

  // mode3コインボタン
  document.querySelectorAll('.m3coin').forEach(btn => {
    btn.addEventListener('click', () => {
      const place = btn.dataset.place;
      if (userCoins[place] >= 9) return;
      userCoins[place]++;
      playCoinTick();
      renderMode3();
      updateLiveBar('mode3');
    });
  });

  function renderMode2() {
    const digits = splitDigits(targetNum);
    renderCoinArea(document.getElementById('m2CoinsH'), COIN_SRC.h, digits.h);
    renderCoinArea(document.getElementById('m2CoinsT'), COIN_SRC.t, digits.t);
    renderCoinArea(document.getElementById('m2CoinsO'), COIN_SRC.o, digits.o);
    document.getElementById('m2DigitH').textContent = userDigits.h;
    document.getElementById('m2DigitT').textContent = userDigits.t;
    document.getElementById('m2DigitO').textContent = userDigits.o;
  }

  document.querySelectorAll('#mode2Screen .spinBtn').forEach(btn => {
    btn.addEventListener('click', () => {
      const place = btn.dataset.place;
      const delta = parseInt(btn.dataset.delta, 10);
      userDigits[place] = (userDigits[place] + delta + 10) % 10;
      playCoinTick();
      document.getElementById(`m2Digit${place.toUpperCase()}`).textContent = userDigits[place];
      updateLiveBar('mode2');
    });
  });

  // ===== 正誤判定 + サウンド + 星エフェクト =====

  function launchStars() {
    const dirs = [[-90,-80],[90,-80],[0,-100],[-120,-40],[120,-40],[-60,-110],[60,-110],[0,-120]];
    const cx = window.innerWidth / 2, cy = window.innerHeight * 0.35;
    dirs.forEach(([dx, dy], i) => {
      const s = document.createElement('div');
      s.className = 'star';
      s.textContent = ['★','✨','⭐'][i % 3];
      s.style.left = cx + 'px'; s.style.top = cy + 'px';
      s.style.setProperty('--dx', dx + 'px');
      s.style.setProperty('--dy', dy + 'px');
      s.style.animationDelay = (i * 0.04) + 's';
      document.body.appendChild(s);
      setTimeout(() => s.remove(), 900);
    });
  }

  function animateCoinAbsorption(prefix, onDone) {
    const DUR = 320;
    const STAGGER = 40;

    const coinImgs = [];
    ['H', 'T', 'O'].forEach(p => {
      const area = document.getElementById(prefix + 'Coins' + p);
      if (area) area.querySelectorAll('.coinImg').forEach(img => coinImgs.push(img));
    });

    if (coinImgs.length === 0) { onDone(); return; }

    const track = document.querySelector('#' + prefix + 'NumberLine .nlTrack');
    const trackRect = track.getBoundingClientRect();
    const destX = trackRect.left + 24;
    const destY = trackRect.top + trackRect.height / 2;
    const rects = coinImgs.map(img => img.getBoundingClientRect());

    ['H', 'T', 'O'].forEach(p => {
      const area = document.getElementById(prefix + 'Coins' + p);
      if (area) area.style.opacity = '0';
    });

    const clones = rects.map((r, i) => {
      const cx = r.left + r.width / 2;
      const cy = r.top + r.height / 2;
      const clone = document.createElement('img');
      clone.src = coinImgs[i].src;
      clone.style.cssText = `position:fixed;left:${cx}px;top:${cy}px;width:${r.width}px;height:${r.height}px;margin-left:${-r.width/2}px;margin-top:${-r.height/2}px;z-index:200;pointer-events:none;will-change:transform,opacity;transform:translate(0,0) scale(1);`;
      document.body.appendChild(clone);
      return { clone, cx, cy };
    });

    requestAnimationFrame(() => {
      clones.forEach(({ clone, cx, cy }, i) => {
        const delay = i * STAGGER;
        clone.style.transition = `transform ${DUR}ms ease-in ${delay}ms, opacity ${Math.round(DUR*0.35)}ms ease ${Math.round(DUR*0.65) + delay}ms`;
        clone.style.transform = `translate(${destX - cx}px,${destY - cy}px) scale(0.15)`;
        clone.style.opacity = '0';
      });
    });

    let doneCount = 0;
    const total = clones.length;
    clones.forEach(({ clone }, i) => {
      setTimeout(() => {
        clone.remove();
        doneCount++;
        if (doneCount === total) onDone();
      }, i * STAGGER + DUR + 140);
    });

    setTimeout(() => {
      ['H','T','O'].forEach(p => {
        document.getElementById(prefix + 'NlBar' + p).style.background = '#4a9eff';
      });
    }, Math.round(DUR * 0.65));
  }

  function onCorrect(resultEl) {
    onStreakCorrect();
    resultEl.textContent = '○ せいかい！';
    resultEl.className = 'result victory';
    playVictory();
    launchStars();

    const prefix = currentMode === 'mode1' ? 'm1' : 'm2';

    setTimeout(() => {
      playSuccess();
      animateCoinAbsorption(prefix, () => {
        setTimeout(nextProblem, 400);
      });
    }, 280);
  }

  function onWrong(resultEl) {
    onStreakWrong();
    resultEl.textContent = '× もういちど';
    resultEl.className = 'result ng';
    playWrong();
    const panel = resultEl.closest('.panel');
    if (panel) {
      panel.classList.remove('shaking');
      requestAnimationFrame(() => {
        panel.classList.add('shaking');
        panel.addEventListener('animationend', () => panel.classList.remove('shaking'), { once: true });
      });
    }
  }

  function handleDone(mode) {
    if (mode === 'mode1') {
      const correct = checkAnswer(userCoins, targetNum);
      const resultEl = document.getElementById('m1Result');
      if (correct) onCorrect(resultEl);
      else onWrong(resultEl);
    } else if (mode === 'mode2') {
      const correct = checkAnswer(userDigits, targetNum);
      const resultEl = document.getElementById('m2Result');
      if (correct) onCorrect(resultEl);
      else onWrong(resultEl);
    } else {
      // mode3: コインはそのまま残し、正解数を加算して次の問題へ
      const correct = checkAnswer(userCoins, targetNum);
      if (correct) {
        m3Score++;
        launchStars();
        playVictory();
        targetNum = generateMode3Problem(targetNum);
        document.getElementById('m3ProblemNum').textContent = targetNum;
        updateLiveBar('mode3');
      } else {
        playWrong();
        const panel = document.getElementById('m3ProblemNum').closest('.panel');
        if (panel) {
          panel.classList.remove('shaking');
          requestAnimationFrame(() => {
            panel.classList.add('shaking');
            panel.addEventListener('animationend', () => panel.classList.remove('shaking'), { once: true });
          });
        }
      }
    }
  }

  document.getElementById('m1SpeakBtn').addEventListener('click', () => speakNumber(targetNum));
  document.getElementById('m1DoneBtn').addEventListener('click', () => handleDone('mode1'));
  document.getElementById('m2DoneBtn').addEventListener('click', () => handleDone('mode2'));
  document.getElementById('m3DoneBtn').addEventListener('click', () => handleDone('mode3'));
  document.getElementById('m3RetryBtn').addEventListener('click', () => startGame('mode3'));

  // ===== ライブ数直線 =====

  function resetBar(prefix) {
    ['H','T','O'].forEach(p => {
      const el = document.getElementById(prefix + 'NlBar' + p);
      el.style.transition = 'none';
      el.style.width = '0%';
      el.style.background = '';
    });
    document.getElementById(prefix + 'NlValue').textContent = '';
    requestAnimationFrame(() => requestAnimationFrame(() => {
      ['H','T','O'].forEach(p => {
        document.getElementById(prefix + 'NlBar' + p).style.transition = '';
      });
    }));
  }

  function updateLiveBar(mode) {
    const coins = (mode === 'mode1' || mode === 'mode3') ? userCoins : userDigits;
    const prefix = mode === 'mode1' ? 'm1' : mode === 'mode2' ? 'm2' : 'm3';
    document.getElementById(prefix + 'NlBarH').style.width = (coins.h * 10).toFixed(1) + '%';
    document.getElementById(prefix + 'NlBarT').style.width = (coins.t * 1).toFixed(1) + '%';
    document.getElementById(prefix + 'NlBarO').style.width = (coins.o * 0.1).toFixed(1) + '%';
    const val = coinsToNumber(coins);
    document.getElementById(prefix + 'NlValue').textContent = val > 0 ? val + 'えん' : '';
  }

  function nextProblem() {
    const prev = targetNum;
    targetNum = generateProblem(prev);

    if (currentMode === 'mode1') {
      userCoins = { h: 0, t: 0, o: 0 };
      document.getElementById('m1ProblemNum').textContent = targetNum;
      document.getElementById('m1Result').textContent = '';
      document.getElementById('m1Result').className = 'result';
      resetBar('m1');
      renderMode1();
      ['H','T','O'].forEach(p => {
        const a = document.getElementById('m1Coins' + p);
        if (a) a.style.opacity = '';
      });
      speakIfOn(targetNum);
    } else if (currentMode === 'mode2') {
      userDigits = { h: 0, t: 0, o: 0 };
      document.getElementById('m2Result').textContent = '';
      document.getElementById('m2Result').className = 'result';
      resetBar('m2');
      renderMode2();
      ['H','T','O'].forEach(p => {
        const a = document.getElementById('m2Coins' + p);
        if (a) a.style.opacity = '';
      });
    }
  }
</script>
